<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Torus Loops — 辺整合パズル</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f131b; color: #dce3f0; font-family: system-ui, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif; overflow: hidden; }
  header {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    padding: 8px 14px; background: #151b27; border-bottom: 1px solid #232c3d;
    min-height: 48px;
  }
  h1 { font-size: 16px; margin: 0 6px 0 0; font-weight: 700; letter-spacing: 0.04em; color: #8fb4ff; white-space: nowrap; }
  label { font-size: 12.5px; color: #9aa7bd; display: inline-flex; align-items: center; gap: 4px; }
  select, button {
    background: #202839; color: #dce3f0; border: 1px solid #33405a; border-radius: 6px;
    padding: 4px 8px; font-size: 12.5px; cursor: pointer;
  }
  select:hover, button:hover { background: #2a3550; }
  button:disabled { opacity: 0.45; cursor: default; }
  #newBtn { background: #2b4a7a; border-color: #3d63a0; }
  #newBtn:hover { background: #35598f; }
  #status { font-size: 12px; color: #8b98b0; margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  details { position: relative; }
  details > summary { list-style: none; cursor: pointer; font-size: 12.5px; color: #9aa7bd; border: 1px solid #33405a; border-radius: 6px; padding: 4px 8px; background: #202839; }
  details[open] > summary { background: #2a3550; }
  details > div {
    position: absolute; z-index: 10; top: calc(100% + 6px); left: 0; width: 340px;
    background: #1a2130; border: 1px solid #33405a; border-radius: 10px; padding: 12px 14px;
    font-size: 12.5px; line-height: 1.75; color: #b9c4d8; box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  details b { color: #dce3f0; }
  #cv { display: block; width: 100vw; height: calc(100vh - 49px); touch-action: none; }
</style>
</head>
<body>
<header>
  <h1>TORUS LOOPS</h1>
  <label>盤
    <select id="rows"><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
    ×
    <select id="cols"><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
  </label>
  <label>色
    <select id="colors">
      <option value="auto" selected>自動 (≈√mn)</option>
      <option>2</option><option>3</option><option>4</option><option>5</option>
      <option>6</option><option>7</option><option>8</option>
    </select>
  </label>
  <button id="newBtn">新しい問題</button>
  <button id="resetBtn">並べ直す</button>
  <button id="peekBtn">答え</button>
  <button id="solveBtn">ソルバーで解く</button>
  <details>
    <summary>遊び方</summary>
    <div>
      <b>ドラッグ</b>で配置、<b>クリック</b>で 90° 回転。<br>
      盤は<b>トーラス</b>（上下・左右がループ）。外周の薄い縁は反対側の写し身で、そこにドロップすると回り込んで置けます。<br>
      各ピースの色付きの点は「中心 ↔ 辺」を往復しています。隣どうし正しく置けると、継ぎ目をまたいで点の流れが<b>連続</b>して見えます（片方が出るとき、もう片方が入る）。ズレていると継ぎ目で点が衝突・断絶します。<br>
      すべての継ぎ目（回り込み含む）が整合したらクリア。<b>盤全体の平行移動・回転も正解</b>扱いです。
    </div>
  </details>
  <span id="status"></span>
</header>
<canvas id="cv"></canvas>
<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
